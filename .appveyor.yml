version: '{build}'
image: Visual Studio 2022

skip_branch_with_pr: true
shallow_clone: true
clone_depth: 1

platform:
  - x64

configuration:
  - Release

only_commits:
  files:
    - /src/
    - /vc17/
    - .appveyor.yml
    - /cmake/
    - vcpkg.json
    - vcpkg-configuration.json
    - CMakeLists.txt

environment:
  VCPKG_ROOT: C:\Tools\vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-windows
  VCPKG_DEFAULT_BINARY_CACHE: C:\Users\appveyor\AppData\Local\vcpkg\archives

install:
  - cmd: cd /d %VCPKG_ROOT%
  - cmd: vcpkg version
  - cmd: cd /d %APPVEYOR_BUILD_FOLDER%
  - cmd: vcpkg install --triplet %VCPKG_DEFAULT_TRIPLET%

before_build:
  - if not exist build mkdir build
  - cd build
  - cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake"

build:
  parallel: true

build_script:
  - cmake --build . --config %CONFIGURATION% --parallel

after_build:
  - cd %APPVEYOR_BUILD_FOLDER%
  - 7z a -tzip TFS.zip -r .\build\%CONFIGURATION%\*.exe -ir!.\build\%CONFIGURATION%\*.dll

cache:
  - C:\Users\appveyor\AppData\Local\vcpkg\archives
  - C:\Tools\vcpkg\installed -> vcpkg.json, vcpkg-configuration.json

artifacts:
  - path: build\**\tfs*.exe
  - path: build\**\*.dll
  - path: TFS.zip

test: off
deploy: off
